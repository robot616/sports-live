        var playerInstance = null;

        function renderChannels(filterText) {
            if (!filterText) filterText = "";
            var listContainer = document.getElementById("channelList");
            listContainer.innerHTML = "";
            
            var addedWorldCupHeader = false;

            for (var i = 0; i < channels.length; i++) {
                var channel = channels[i];
                
                if (channel.name.toLowerCase().indexOf(filterText.toLowerCase()) !== -1) {
                    
                    if (channel.isWorldCup && !addedWorldCupHeader && filterText === "") {
                        var wcHeader = document.createElement("div");
                        wcHeader.className = "category-header world-cup";
                        wcHeader.innerText = "🏆 World Cup 2026";
                        listContainer.appendChild(wcHeader);
                        addedWorldCupHeader = true;
                    }

                    var btn = document.createElement("div");
                    btn.className = "channel-btn";
                    btn.id = "btn-" + i;
                    
                    var typeBadge = channel.url.indexOf(".m3u8") !== -1 ? "HLS" : "DASH";

                    btn.innerHTML = '<span>' + channel.name + '</span>' +
                                    '<span style="font-size: 10px; color: #aaa; background: #333; padding: 2px 6px; border-radius: 4px;">' + typeBadge + '</span>';
                    
                    (function(index) {
                        btn.onclick = function() {
                            playChannel(index);
                        };
                    })(i);
                    
                    listContainer.appendChild(btn);
                }
            }
        }

        function playChannel(index) {
            var channel = channels[index];
            
            var allBtns = document.querySelectorAll(".channel-btn");
            for (var j = 0; j < allBtns.length; j++) {
                allBtns[j].classList.remove("active");
            }
            var activeBtn = document.getElementById("btn-" + index);
            if(activeBtn) activeBtn.classList.add("active");

            var setupConfig = {
                file: channel.url,
                type: channel.url.indexOf(".m3u8") !== -1 ? "hls" : "dash",
                width: "100%", height: "100%",
                autostart: true, preload: "auto", stretching: "uniform"
            };

            if (channel.k1 && channel.k2) {
                setupConfig.drm = {
                    clearkey: { keyId: channel.k1, key: channel.k2 }
                };
            }

            playerInstance = jwplayer("player").setup(setupConfig);

            playerInstance.on('ready', function() {
                var isStretched = false;
                var diagonalCutArrow = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmZmIiBzdHJva2Utd2lkdGg9IjuNiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cGF0aCBkPSJNMTQgMTBsNy03bS02IDBoNnY2bS0xMSA1bC03IDdtNiAwSDN2LTYiLz48L3N2Zz4=";

                playerInstance.addButton(
                    diagonalCutArrow, 
                    "توسيع/تضييق الصورة", 
                    function() {
                        if (!isStretched) {
                            playerInstance.setConfig({ stretching: "exactfit" }); 
                            isStretched = true;
                        } else {
                            playerInstance.setConfig({ stretching: "uniform" });
                            isStretched = false;
                        }
                    },
                    "stretch-button"
                );
            });
        }

        function filterChannels() {
            var text = document.getElementById("searchInput").value;
            renderChannels(text);
